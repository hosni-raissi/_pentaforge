services:
  backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      PROJECTS_DB_PATH: /data/projects/projects.db
      PENTAFORGE_RELOAD: "0"
      HF_HOME: /data/huggingface
      SENTENCE_TRANSFORMERS_HOME: /data/huggingface
      SANDBOX_EXECUTOR_URL: http://tool-sandbox:8010
    volumes:
      - backend_projects_data:/data/projects
      - backend_model_cache:/data/huggingface
      - backend_cache:/app/server/cache
      - backend_logs:/app/server/logs
    depends_on:
      - redis
      - qdrant
      - tool-sandbox

  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

  tool-sandbox:
    build:
      context: ../../
      dockerfile: infra/docker/sandbox.Dockerfile
    environment:
      PENTAFORGE_SANDBOX_SERVICE: "1"
    expose:
      - "8010"
    volumes:
      - sandbox_workspace:/app/server/sandbox
      - backend_cache:/app/server/cache
      - backend_logs:/app/server/logs

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  backend_projects_data:
  backend_model_cache:
  backend_cache:
  backend_logs:
  sandbox_workspace:
  redis_data:
  qdrant_data:
