services:
  # ── Qdrant (vector store — embeddings + metadata index) ─────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pentaforge-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis (cache — hot queries + recent results) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: pentaforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PentaForge Knowledge Ingestion / CLI ────────────────────────────────
  knowledge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pentaforge-knowledge
    restart: "no"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      KNOWLEDGE_DATA_DIR: /app/data
      KNOWLEDGE_NVD_API_KEY: ${NVD_API_KEY:-}
    volumes:
      - knowledge_data:/app/data
    # Default: list sources. Override to ingest/search:
    #   docker compose run knowledge ingest --all
    #   docker compose run knowledge search "SQL injection"
    #   docker compose run knowledge cve lookup CVE-2024-3094
    command: ["sources"]

volumes:
  qdrant_data:
  redis_data:
  knowledge_data:
